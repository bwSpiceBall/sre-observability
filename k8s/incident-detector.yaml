apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-detector
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incident-detector
  template:
    metadata:
      labels:
        app: incident-detector
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: incident-detector
          image: incident-detector:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: SERVICE_NAME
              value: "incident-detector"
            - name: LOG_LEVEL
              value: "info"
            - name: PROMETHEUS_URL
              value: "http://prometheus.monitoring.svc.cluster.local:9090"
            - name: REDIS_HOST
              value: "redis.default.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: EVAL_INTERVAL_MS
              value: "15000"
            - name: COOLDOWN_MS
              value: "300000"
            - name: ERROR_RATE_THRESHOLD
              value: "0.05"
            - name: LATENCY_P95_THRESHOLD_S
              value: "2.0"
            - name: MEMORY_THRESHOLD_BYTES
              value: "209715200"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: incident-detector
  namespace: default
spec:
  type: NodePort
  selector:
    app: incident-detector
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30082
